<!doctype html>
<html>
  <head>
    <title>Jarvis Browser</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <!-- NAV -->
    <div id="nav">
      <button onclick="goBack()">
        <img class="icon" src="./icon/chevron-left.svg" alt="leftNav-Icon" />
      </button>
      <button onclick="goForward()">
        <img class="icon" src="./icon/chevron-right.svg" alt="rightNav-Icon" />
      </button>
      <button onclick="reloadPage()">
        <img class="icon" src="./icon/refresh-cw.svg" alt="refreshNav-Icon" />
      </button>
      <div class="urlBlock">
        <img src="./icon/logo.svg" alt="refreshNav-Icon" />
        <input id="url" value="https://example.com" />
        <!-- <input id="url" value="https://india-1x-bet.com/en/user/login/" /> -->
      </div>

      <button onclick="navigate()">
        <img class="icon" src="./icon/send.svg" alt="sendNav-Icon" />
      </button>
    </div>

    <!-- LAYOUT -->
    <div id="layout">
      <div id="browser">
        <webview
          id="browser-view"
          src="https://example.com"
          style="width: 100%; height: 100%; display: block; border: none"
        ></webview>
        <div class="animation">
          <div class="animationLayerColor"></div>
          <div class="animationLayer"></div>
        </div>
      </div>

      <div id="ai">
        <form id="ai-form">
          <div class="statusBlock">
            <img src="./icon/logo.svg" alt="refreshNav-Icon" />
            <p>Limit your availability to create exclusivity...</p>
          </div>
          <textarea id="cmd" placeholder="Type command..." rows="4"></textarea>
        </form>
        <div id="logs"></div>
      </div>
    </div>

    <script>
      // ✅ GLOBAL STATE
      window.aiState = {
        ready: false,
        pendingCommand: null,
      };

      function formatURL(url) {
        if (!url.startsWith("http")) {
          return "https://" + url;
        }
        return url;
      }

      async function navigate() {
        const url = formatURL(document.getElementById("url").value);

        const webview = document.getElementById("browser-view");

        webview.loadURL(url);

        await fetch("http://localhost:3001/navigate", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({ url }),
        });
      }

      // 🔙 BACK
      function goBack() {
        const webview = document.getElementById("browser-view");

        if (webview.canGoBack()) {
          webview.goBack();
        }
      }
      window.onload = async () => {
        const frame = document.getElementById("browser-view");

        const url = formatURL(document.getElementById("url").value);

        frame.src = url;

        try {
          const res = await fetch("http://localhost:3001/init", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ url }),
          });

          const data = await res.json();

          console.log(data);
        } catch (err) {
          console.error(err);
        }
      };
      function goForward() {
        const webview = document.getElementById("browser-view");

        if (webview.canGoForward()) {
          webview.goForward();
        }
      }

      // 🔄 RELOAD
      function reloadPage() {
        document.getElementById("browser-view").reload();
      }

      function log(msg) {
        const logs = document.getElementById("logs");
        const div = document.createElement("div");
        div.innerText = msg;
        logs.appendChild(div);
        logs.scrollTop = logs.scrollHeight;
      }

      // INIT
    </script>

    <script src="ai.js"></script>
  </body>
</html>
