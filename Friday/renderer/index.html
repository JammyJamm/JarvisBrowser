<!doctype html>
<html>
  <head>
    <title>Jarvis Browser</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <!-- NAV -->
    <div id="nav">
      <button onclick="goBack()">
        <img class="icon" src="./icon/chevron-left.svg" alt="leftNav-Icon" />
      </button>
      <button onclick="goForward()">
        <img class="icon" src="./icon/chevron-right.svg" alt="rightNav-Icon" />
      </button>
      <button onclick="reloadPage()">
        <img class="icon" src="./icon/refresh-cw.svg" alt="refreshNav-Icon" />
      </button>
      <div class="urlBlock">
        <img src="./icon/logo.svg" alt="refreshNav-Icon" />
        <input id="url" value="https://example.com" />
      </div>

      <button onclick="navigate()">
        <img class="icon" src="./icon/send.svg" alt="sendNav-Icon" />
      </button>
    </div>

    <!-- LAYOUT -->
    <div id="layout">
      <div id="browser"></div>

      <div id="ai">
        <form id="ai-form">
          <input id="cmd" placeholder="Type command..." />
        </form>
        <div id="logs"></div>
      </div>
    </div>

    <script>
      // ✅ GLOBAL STATE
      window.aiState = {
        ready: false,
        pendingCommand: null,
      };

      function formatURL(url) {
        if (!url.startsWith("http")) {
          return "https://" + url;
        }
        return url;
      }

      function renderBrowser() {
        if (document.getElementById("webview")) return;

        const webview = document.createElement("webview");

        webview.id = "webview";
        webview.src = formatURL(document.getElementById("url").value);

        // ✅ DOM READY
        webview.addEventListener("dom-ready", () => {
          console.log("✅ Page loaded");

          window.aiState.ready = true;

          // 🚀 run pending AI command
          if (window.aiState.pendingCommand) {
            const cmd = window.aiState.pendingCommand;
            window.aiState.pendingCommand = null;
            runAI(cmd);
          }
        });

        // ✅ URL SYNC
        webview.addEventListener("did-navigate", (e) => {
          document.getElementById("url").value = e.url;
        });

        webview.addEventListener("did-navigate-in-page", (e) => {
          document.getElementById("url").value = e.url;
        });

        document.getElementById("browser").appendChild(webview);
      }

      function navigate() {
        const webview = document.getElementById("webview");

        if (!webview) {
          renderBrowser();
          return;
        }

        window.aiState.ready = false;

        webview.loadURL(formatURL(document.getElementById("url").value));
      }

      function getWebview() {
        return document.getElementById("webview");
      }

      // 🔙 BACK
      function goBack() {
        const webview = getWebview();

        if (!webview) return log("❌ No webview");

        if (webview.canGoBack()) {
          window.aiState.ready = false;
          webview.goBack();
        } else {
          log("⚠️ No back history");
        }
      }

      // 🔜 FORWARD
      function goForward() {
        const webview = getWebview();

        if (!webview) return log("❌ No webview");

        if (webview.canGoForward()) {
          window.aiState.ready = false;
          webview.goForward();
        } else {
          log("⚠️ No forward history");
        }
      }

      // 🔄 RELOAD
      function reloadPage() {
        const webview = getWebview();

        if (!webview) return log("❌ No webview");

        window.aiState.ready = false;
        webview.reload();
      }

      function log(msg) {
        const logs = document.getElementById("logs");
        const div = document.createElement("div");
        div.innerText = msg;
        logs.appendChild(div);
        logs.scrollTop = logs.scrollHeight;
      }

      // INIT
      window.onload = () => {
        renderBrowser();
      };
    </script>

    <script src="ai.js"></script>
  </body>
</html>
